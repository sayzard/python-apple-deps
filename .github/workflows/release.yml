name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build all packages and create release
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install build dependencies
        run: |
          brew install cmake automake libtool pkg-config gcc

      - name: Build all packages
        run: ./build_all.sh

      - name: Package xcframeworks
        run: ./package_xcframeworks.sh

      - name: Compute checksums
        run: |
          cd xcframeworks
          shasum -a 256 *.xcframework.zip > ../checksums.sha256
          cat ../checksums.sha256

      - name: Update Package.swift checksums
        run: |
          python3 - <<'EOF'
          import re

          checksums = {}
          with open("checksums.sha256") as f:
              for line in f:
                  line = line.strip()
                  if "  " in line:
                      sha, fname = line.split("  ", 1)
                      name = fname.replace(".xcframework.zip", "")
                      checksums[name] = sha

          with open("Package.swift") as f:
              content = f.read()

          def replacer(m):
              name = m.group(1)
              old = m.group(0)
              if name in checksums:
                  return re.sub(r'checksum: "[^"]*"', f'checksum: "{checksums[name]}"', old)
              return old

          content = re.sub(r'xcfw\("([^"]+)",[^)]+\)', replacer, content)

          with open("Package.swift", "w") as f:
              f.write(content)

          print("Updated Package.swift with", len(checksums), "checksums")
          EOF

      - name: Commit updated Package.swift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift checksums.sha256
          git diff --cached --quiet || git commit -m "chore: update checksums for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xcframeworks/*.xcframework.zip
            checksums.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
