name: Feature Request
description: Suggest a new package or improvement
labels: ["enhancement"]
body:
  - type: input
    id: package-name
    attributes:
      label: Package / Feature
      placeholder: "e.g. Add libsqlite3 xcframework"
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? Which projects depend on it?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Implementation Notes
      description: Suggested version, source URL, cmake flags, dependencies
