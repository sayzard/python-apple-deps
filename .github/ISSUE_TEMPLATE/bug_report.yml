name: Bug Report
description: Report a build failure or xcframework issue
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Please fill out as much detail as possible."
  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: "e.g. 14.5"
    validations:
      required: true
  - type: input
    id: xcode-version
    attributes:
      label: Xcode Version
      placeholder: "e.g. 16.2"
    validations:
      required: true
  - type: input
    id: cmake-version
    attributes:
      label: cmake Version
      placeholder: "e.g. 4.0.2"
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Affected Package
      placeholder: "e.g. build_gdal.sh / libgdal.xcframework"
    validations:
      required: true
  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Full terminal output from the failing script
      render: shell
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Run ./build_all.sh\n2. ..."
    validations:
      required: true
